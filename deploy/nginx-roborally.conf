# RoboRally
# A inserer dans le bloc HTTPS `server` de www.stansgames.fr.
# Le projet Node est attendu dans /home/ubuntu/roborally et ecoute sur 127.0.0.1:6282.
# Lancer Node avec BASE_PATH=/roborally pour que les assets, l'API, le QR code
# et Socket.IO pointent vers le bon prefixe public.

location = /roborally {
    return 301 /roborally/display/;
}

location = /roborally/display {
    return 301 /roborally/display/;
}

location = /roborally/player {
    return 301 /roborally/player/;
}

location = /roborally/backoffice {
    return 301 /roborally/backoffice/;
}

location ^~ /roborally/socket.io/ {
    proxy_pass http://127.0.0.1:6282;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
}

location ^~ /roborally/api/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    proxy_pass http://127.0.0.1:6282;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /roborally/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    proxy_pass http://127.0.0.1:6282;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
}
